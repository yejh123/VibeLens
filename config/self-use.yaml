# VibeLens — Self-Use Configuration
# Default mode: local sessions from ~/.claude/ + file uploads.
#
# Usage:
#   vibelens serve --config config/self-use.yaml
#   VIBELENS_CONFIG=config/self-use.yaml vibelens serve

app:
  mode: self

server:
  host: 127.0.0.1
  port: 12001

sources:
  claude_dir: ~/.claude

upload:
  dir: ~/.vibelens/uploads
  max_zip_bytes: 209715200        # 200 MB
  max_extracted_bytes: 524288000  # 500 MB
  max_file_count: 10000
