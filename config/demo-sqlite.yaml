# VibeLens — Demo Configuration (SQLite Storage)
# Public-facing mode with persistent storage: pre-loaded examples +
# uploads persisted to SQLite. Useful when uploads should survive restarts.
#
# Usage:
#   vibelens serve --config config/demo-sqlite.yaml
#   VIBELENS_CONFIG=config/demo-sqlite.yaml vibelens serve

app:
  mode: demo

demo:
  storage: sqlite                  # Uploads persisted to SQLite
  example_sessions: ""             # Comma-separated paths to pre-load
  session_ttl: 3600                # Not used with sqlite storage
  persist_uploads: true            # Save raw uploaded files to disk

server:
  host: 0.0.0.0
  port: 12001

database:
  path: ~/.vibelens/demo.db

upload:
  dir: ~/.vibelens/demo-uploads
  allowed_extensions: ".json,.jsonl"
  max_file_size_bytes: 10485760   # 10 MB per file
  max_zip_bytes: 52428800         # 50 MB
  max_extracted_bytes: 104857600  # 100 MB
  max_file_count: 1000
