# VibeLens — Demo Configuration
# Public-facing mode: pre-loaded examples + user uploads.
# No local source scanning.
#
# Usage:
#   vibelens serve --config config/demo.yaml
#   VIBELENS_CONFIG=config/demo.yaml vibelens serve

app:
  mode: demo

demo:
  example_sessions: "examples/claude-codex-example"

server:
  host: 0.0.0.0                   # Bind to all interfaces for public access
  port: 12001

upload:
  max_zip_bytes: 10737418240      # 10 GB
  max_extracted_bytes: 21474836480 # 20 GB
  max_file_count: 10000
