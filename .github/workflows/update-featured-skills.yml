name: Update Featured Skills

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch featured-skills.json from skills-hub
        run: |
          curl -fsSL "https://raw.githubusercontent.com/qufei1993/skills-hub/main/featured-skills.json" \
            -o featured-skills.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add featured-skills.json
          git diff --cached --quiet || git commit -m "chore: update featured-skills.json"
          git push
